# =============================================================================
# Tuitional Education — Chart of Accounts
# =============================================================================
# This file is the source of truth for the COA. The Python loader reads this
# into the `chart_of_accounts` table. Any change here requires:
#   1. CFO approval
#   2. A migration that updates the loaded rows in the database
#   3. Validation that no existing journal lines reference removed accounts
#
# Schema for each account:
#   code:               4-digit string, unique. Numeric ranges have meaning.
#   name:               Human-readable name
#   type:               asset | liability | equity | revenue | expense | contra | memo
#   normal_balance:     debit | credit
#   parent:             Parent account code (or null for top-level)
#   statement:          BS (balance sheet) | IS (income statement) | MEMO (off-statement)
#   is_postable:        true if journals can target this account directly;
#                       false for headers / parent accounts
#   sub_ledger:         null | student_wallet | tutor_payable | fixed_asset |
#                       prepaid | intangible | sanction_memo
#   currency:           AED (default for all reporting); some sub-ledgers also
#                       track an original currency (e.g. PKR for tutor payable)
#   is_memo:            true for memo accounts (9xxx). Excluded from BS/IS
#                       roll-ups; still participate in the balanced-JE invariant.
#                       Per accounting_rules.md §13, memo postings must net to
#                       zero across the pair (2060 vs 9010) on the same JE.
#   subtype:            optional reporting discriminator (e.g. "memo").
#   description:        Operational notes
#
# Numbering convention (IFRS-aligned):
#   1xxx — Assets (1000-1099 current, 1100-1199 non-current)
#   2xxx — Liabilities (2000-2099 current, 2100-2199 non-current)
#   3xxx — Equity
#   4xxx — Revenue
#   5xxx — Cost of Service (direct costs)
#   6xxx — Operating Expenses
#   7xxx — Non-operating items (FX, interest, disposals)
#   9xxx — Memo accounts (off-statement; counter accounts for sanction memos etc.)
# =============================================================================

