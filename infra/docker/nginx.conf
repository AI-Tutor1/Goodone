# Tuitional Finance — frontend SPA + /api proxy.

server {
    listen 8080;
    server_name _;
    server_tokens off;

    # Security headers
    add_header X-Content-Type-Options "nosniff"           always;
    add_header X-Frame-Options        "DENY"              always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets — long cache, immutable filenames from Vite.
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # API → backend container (resolved via Docker / systemd network)
    location /api/ {
        proxy_pass         http://backend:3002/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
        proxy_read_timeout 60s;
    }

    # SPA fallback — any non-/api, non-asset path returns index.html.
    location / {
        try_files $uri /index.html;
    }
}
